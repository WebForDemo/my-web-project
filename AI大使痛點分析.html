
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 大使痛點分析 · 振曜科技</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#10a37f;--primary-dark:#0d8a6b;--secondary:#1e3a5f;--secondary-light:#2d527f;
  --accent:#f59e0b;--bg:#eef2f6;--panel:#fff;--text:#1a202c;--muted:#64748b;--line:#e2e8f0;
  --red:#ef4444;--yellow:#f59e0b;--green:#10b981;
  --shadow:0 4px 24px rgba(15,40,80,.08);--shadow-lg:0 14px 48px rgba(15,40,80,.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.topbar{background:linear-gradient(135deg,#0d1117 0%,#1a2744 55%,#0d8a6b 130%);color:#fff;flex:none;
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  box-shadow:var(--shadow-lg);position:relative;z-index:20}
.topbar .ttl{display:flex;align-items:center;gap:14px}
.topbar .logo{width:44px;height:44px;border-radius:11px;background:rgba(16,163,127,.2);border:1px solid rgba(16,163,127,.5);display:grid;place-items:center;font-size:22px}
.topbar h1{font-size:19px;font-weight:800;letter-spacing:.5px}
.topbar .sub{font-size:12px;color:#9fb3c8;margin-top:1px}
.metrics{display:flex;gap:10px;flex-wrap:wrap}
.metric{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:7px 16px;text-align:center;min-width:74px}
.metric .v{font-size:20px;font-weight:800;line-height:1.1}
.metric .v.gold{color:#fcd34d}.metric .v.red{color:#fca5a5}
.metric .l{font-size:10.5px;color:#9fb3c8;margin-top:1px}

.tabnav{flex:none;background:var(--panel);border-bottom:1px solid var(--line);display:flex;padding:0 24px;box-shadow:0 2px 8px rgba(0,0,0,.05);z-index:10}
.tab-btn{display:flex;align-items:center;gap:8px;padding:14px 22px;border:none;background:none;cursor:pointer;
  font:inherit;font-size:14.5px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn .cnt{background:#e2e8f0;color:var(--secondary);font-size:11.5px;font-weight:800;padding:1px 8px;border-radius:99px}
.tab-btn.active .cnt{background:#d1fae5;color:#065f46}

.panel-area{flex:1;min-height:0;position:relative}
.panel{display:none;height:100%;overflow:hidden}
.panel.active{display:block}

.layout{display:flex;height:100%}
.sidebar{width:344px;flex-shrink:0;background:#f4f7fa;border-right:1px solid var(--line);display:flex;flex-direction:column}
.side-search{padding:14px;border-bottom:1px solid var(--line);position:relative;background:var(--panel)}
.side-search input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:13.5px;background:#f8fafc}
.side-search::before{content:"🔍";position:absolute;left:26px;top:50%;transform:translateY(-50%);opacity:.45;font-size:13px}
.side-list{overflow-y:auto;flex:1;padding:0 10px 14px}

.dept-label{position:sticky;top:0;z-index:3;margin:14px 2px 8px;padding:9px 14px;border-radius:9px;
  background:linear-gradient(90deg,var(--secondary),var(--secondary-light));color:#fff;
  font-size:12.5px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 10px rgba(30,58,95,.22)}
.dept-label .nm{display:flex;align-items:center;gap:8px}
.dept-label .nm::before{content:"";width:7px;height:7px;border-radius:50%;background:#5eead4}
.dept-label .c{background:rgba(255,255,255,.22);padding:1px 9px;border-radius:99px;font-size:11px;font-weight:700}

.pcard{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:all .13s;border:1px solid transparent;background:var(--panel);margin-bottom:7px;box-shadow:0 1px 3px rgba(15,40,80,.04)}
.pcard:hover{border-color:#86efac;transform:translateX(2px)}
.pcard.active{background:linear-gradient(135deg,#ecfdf5,#fff);border-color:var(--primary);box-shadow:var(--shadow)}
.avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--secondary-light),var(--primary))}
.pcard .info{flex:1;min-width:0}
.pcard .nm{font-weight:700;color:var(--secondary);font-size:14px;display:flex;align-items:center;gap:6px}
.pcard .meta{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px;margin-top:2px}
.pcard .meta .role{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.pcard .meta .dots{display:flex;gap:3px;flex-shrink:0}
.mini-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px}
.mini-tag.amb{background:#dcfce7;color:#166534}.mini-tag.non{background:#e2e8f0;color:#475569}
.pcard .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.paincnt{font-size:11px;font-weight:800;color:var(--accent);background:#fef3c7;padding:1px 8px;border-radius:99px}
.dots{display:flex;gap:3px}
.dot{width:8px;height:8px;border-radius:50%}
.dot.red{background:var(--red)}.dot.yellow{background:var(--yellow)}.dot.green{background:var(--green)}

.detail{flex:1;overflow-y:auto;padding:28px 36px}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;text-align:center}
.empty-state .big{font-size:54px;opacity:.35}
.dh{display:flex;align-items:flex-start;gap:18px;margin-bottom:22px;flex-wrap:wrap}
.dh .av{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;font-size:26px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--secondary),var(--primary));flex-shrink:0}
.dh .who h2{font-size:26px;font-weight:800;color:var(--secondary);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dh .who .line{color:var(--muted);font-size:13.5px;margin-top:3px}
.dh .who .line b{color:var(--secondary)}
.badge{font-size:12px;font-weight:700;padding:3px 11px;border-radius:99px}
.badge.amb{background:#dcfce7;color:#166534}.badge.non{background:#e2e8f0;color:#475569}
.dh .kpis{margin-left:auto;display:flex;gap:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 18px;text-align:center;box-shadow:var(--shadow)}
.kpi .v{font-size:24px;font-weight:800;color:var(--secondary);line-height:1}
.kpi .v.gold{color:var(--accent)}
.kpi .l{font-size:11px;color:var(--muted);margin-top:4px}
.section-t{font-size:13px;font-weight:800;color:var(--secondary);text-transform:uppercase;letter-spacing:.6px;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-t::before{content:"";width:4px;height:15px;background:var(--primary);border-radius:2px}
.worktags{display:flex;flex-wrap:wrap;gap:8px}
.wtag{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 13px;font-size:13px;color:var(--secondary);font-weight:600}
.pain{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;position:relative}
.pain.gold{border-color:#fcd34d;box-shadow:0 6px 28px rgba(245,158,11,.18)}
.pain-head{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,#fafdff,#fff)}
.pain.gold .pain-head{background:linear-gradient(90deg,#fffbeb,#fff)}
.pain-num{width:30px;height:30px;border-radius:9px;background:var(--secondary);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex-shrink:0}
.pain.gold .pain-num{background:var(--accent)}
.pain-title{font-size:16px;font-weight:800;color:var(--secondary);flex:1}
.gold-ribbon{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:99px;white-space:nowrap}
.light{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;white-space:nowrap;padding:4px 11px;border-radius:99px}
.light.red{background:#fef2f2;color:#b91c1c}.light.yellow{background:#fffbeb;color:#b45309}.light.green{background:#f0fdf4;color:#15803d}
.light .b{width:10px;height:10px;border-radius:50%}
.light.red .b{background:var(--red)}.light.yellow .b{background:var(--yellow)}.light.green .b{background:var(--green)}
.pain-body{padding:6px 20px 18px}
.frow{display:flex;gap:14px;padding:11px 0;border-bottom:1px dashed var(--line)}
.frow:last-child{border-bottom:none}
.frow .fl{width:96px;flex-shrink:0;font-size:12.5px;font-weight:700;color:var(--muted);padding-top:1px}
.frow .fv{flex:1;font-size:13.5px;color:var(--text);white-space:pre-wrap;word-break:break-word}
.sig-tags,.aifeat{display:flex;flex-wrap:wrap;gap:6px}
.sig{background:#eef2f6;color:var(--secondary);font-size:12px;font-weight:600;padding:2px 9px;border-radius:7px}
.aifeat span{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;font-size:12px;font-weight:600;padding:2px 9px;border-radius:7px}

.soon{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);text-align:center;padding:24px}
.soon .ic{font-size:60px;opacity:.4}
.soon h2{font-size:22px;font-weight:800;color:var(--secondary)}
.soon p{font-size:14px;max-width:440px}

@media(max-width:820px){
  body{height:auto;overflow:auto}.panel,.panel.active{height:auto}.layout{flex-direction:column;height:auto}
  .sidebar{width:100%;max-height:46vh}.detail{padding:20px}.dh .kpis{margin-left:0;width:100%}
}

/* ===== 痛點分析 Tab ===== */
.dash{height:100%;overflow-y:auto;padding:22px 16px;display:flex;flex-direction:column;gap:18px}
/* 優先排序表 + 大小任務 */
.szfilter{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.szfilter button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 13px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--secondary);transition:.12s}
.szfilter button:hover{border-color:var(--primary)}
.szfilter button.on{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{text-align:center;padding:9px 8px;background:#f1f5f9;color:var(--secondary);font-weight:700;font-size:12px;border-bottom:2px solid var(--line)}
.ptable th.l{text-align:left}
.ptable th.sortth{cursor:pointer;user-select:none;white-space:nowrap}
.ptable th.sortth:hover{color:var(--primary)}
.ptable td{padding:8px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
.ptable td.l{text-align:left}.ptable td.num{font-weight:700;color:var(--secondary)}
.ptable tbody tr{cursor:pointer}.ptable tbody tr:hover{background:#f0fdf9}
.szb{font-size:11px;font-weight:800;padding:2px 9px;border-radius:99px;white-space:nowrap}
.szb.big{background:#fee2e2;color:#b91c1c}.szb.sml{background:#dcfce7;color:#166534}
.scbar{display:inline-block;width:64px;height:8px;background:#eef2f6;border-radius:99px;overflow:hidden;vertical-align:middle}
.scbar>i{display:block;height:100%;background:linear-gradient(90deg,#0d8a6b,#6ee7b7)}
.scn{font-weight:800;color:var(--secondary);margin-left:6px;font-size:12px}
.sorthint{font-size:12.5px;color:var(--secondary);background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:9px 13px;margin-bottom:12px;line-height:1.6}
.sorthint .sortchain{display:inline-block;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;font-weight:700;padding:2px 10px;border-radius:99px;margin:0 8px}
.sorthint .sortclear{color:#dc2626;cursor:pointer;font-weight:700;text-decoration:underline}
.ptable th.sortth{cursor:pointer;user-select:none;white-space:nowrap}
.ptable th.sortth:hover{color:var(--primary);background:#e8eef5}
/* ── Tab3 行動方案 ── */
.strat{background:linear-gradient(110deg,#0d1117,#1a2744);color:#e2e8f0;border-radius:12px;padding:13px 18px;font-size:13.5px;margin-bottom:8px;letter-spacing:.3px}
.strat b{font-weight:800}
/* 路線圖：連結節點流（圖2風） */
.rmsvg{width:100%;height:auto;display:block;max-width:1200px;margin:6px auto 18px}
.rmnode{cursor:pointer}.rmnode text{pointer-events:none}
.rmnode circle{transition:.15s}
.rmnode:hover circle{stroke-width:10}
.rm-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch}
@media(max-width:980px){.rm-detail{grid-template-columns:1fr}}
.phcard{border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(15,40,80,.08);background:#fff;display:flex;flex-direction:column;height:480px}
.phcard.now{border-color:#86efac}.phcard.next{border-color:#93c5fd}.phcard.future{border-color:#cbd5e1}
.ph-top{padding:14px 16px;color:#fff;position:relative}
.phcard.now .ph-top{background:linear-gradient(120deg,#0b7a5e,#14b88d)}
.phcard.next .ph-top{background:linear-gradient(120deg,#17314f,#36608c)}
.phcard.future .ph-top{background:linear-gradient(120deg,#566273,#94a3b8)}
.ph-when{font-size:10.5px;font-weight:800;letter-spacing:1.2px;opacity:.92}
.ph-title{font-size:18px;font-weight:800;margin-top:2px}
.ph-metric{margin-top:7px;font-size:12px;font-weight:700;opacity:.96;background:rgba(255,255,255,.16);display:inline-block;padding:3px 11px;border-radius:99px}
.ph-badge{position:absolute;top:12px;right:14px;background:#fff;color:#0b7a5e;font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ph-body{padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;background:#fbfdff;flex:1}
.phcard.future{opacity:.94}
.pitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;background:#fff;cursor:pointer;transition:.12s}
.pitem:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.pitem .pi-t{flex:0 1 auto;min-width:0;max-width:62%}
.pitem .pi-t b{font-size:12.5px;color:var(--secondary);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .pi-t span{font-size:10.5px;color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .pi-sc{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:12.5px;font-weight:800;color:#fff;background:var(--primary)}
.pitem .pi-prog{flex:1;min-width:40px;height:9px;background:#eef2f6;border-radius:99px;overflow:hidden}
.pitem .pi-prog>i{display:block;height:100%;border-radius:99px;opacity:.85}
/* 優先層級漏斗（圖1風） */
.funnel{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.ftier{display:flex;align-items:center}
.fbul{width:184px;flex-shrink:0;margin:0;padding:0 24px 0 2px;list-style:none;text-align:left;font-size:12.5px;font-weight:600;color:#475569;line-height:1.75}
.fbul li{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.fbul li:hover{color:var(--primary);text-decoration:underline}
.fbul li::marker{color:#94a3b8}
.fbadge{width:56px;height:56px;border-radius:50%;background:#fff;border:4px solid;display:grid;place-items:center;font-weight:800;font-size:18px;color:var(--secondary);z-index:2;margin-right:-28px;box-shadow:0 4px 12px rgba(0,0,0,.18);flex-shrink:0}
.fbarwrap{flex:1}
.fbar{height:66px;border-radius:12px;display:flex;align-items:center;padding-left:46px;color:#fff;box-shadow:0 4px 16px rgba(15,40,80,.18);gap:14px;transition:.15s}
.fbar:hover{filter:brightness(1.06)}
.fbar-t{font-size:18px;font-weight:800;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.18)}
.fbar-d{font-size:13px;font-weight:600;opacity:.96;white-space:nowrap}
.fcount{margin-left:auto;margin-right:16px;font-size:13.5px;font-weight:800;background:rgba(255,255,255,.28);padding:3px 13px;border-radius:99px;white-space:nowrap}
.fnaxis{margin-top:14px;font-size:11.5px;color:var(--muted);text-align:center}
@media(max-width:760px){.fbul{display:none}.fbadge{margin-right:-25px}}
.filterbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:13px}
.filterbar>b{color:var(--secondary)}
.fchip{background:#e0f2fe;color:#075985;border:1px solid #bae6fd;padding:3px 11px;border-radius:99px;font-weight:700;font-size:12px}
.fclear{border:none;background:#fee2e2;color:#b91c1c;font:inherit;font-weight:700;font-size:12px;padding:3px 11px;border-radius:99px;cursor:pointer}
.fcount{margin-left:auto;color:var(--muted);font-size:12px}.fhint{color:var(--muted)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.grid2{display:grid;grid-template-columns:1fr 1.3fr;gap:15px}
@media(max-width:880px){.grid3,.grid2{grid-template-columns:1fr}}
.tcard{position:relative;border-radius:18px;padding:18px 20px;color:#fff;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;border:2px solid transparent;overflow:hidden}
.tcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.tcard.dim{opacity:.45;filter:saturate(.7)}
.tcard.sel{border-color:#fff;box-shadow:var(--shadow-lg)}
.tcard.t1{background:linear-gradient(135deg,#0b7a5e,#13b48b)}
.tcard.t2{background:linear-gradient(135deg,#17314f,#33597f)}
.tcard.t3{background:linear-gradient(135deg,#b45309,#f7a83b)}
.tcard .tc-wm{position:absolute;right:-12px;bottom:-22px;font-size:104px;opacity:.13;line-height:1;transform:rotate(-8deg);pointer-events:none}
.tcard .tc-head{display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.tcard .tc-ic{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:23px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
.tcard .tc-t{font-size:18px;font-weight:800;letter-spacing:.5px;line-height:1.1}
.tcard .tc-nm{font-size:11.5px;opacity:.85;margin-top:1px}
.tcard .tc-big{display:flex;align-items:baseline;gap:7px;margin:15px 0 10px;position:relative;z-index:1}
.tcard .tc-num{font-size:42px;font-weight:800;line-height:1;letter-spacing:-1px}
.tcard .tc-u{font-size:13px;opacity:.9;font-weight:600}
.tcard .tc-pct{margin-left:auto;font-size:12px;font-weight:800;background:rgba(255,255,255,.22);padding:3px 11px;border-radius:99px}
.tcard .tc-bar{height:6px;background:rgba(255,255,255,.22);border-radius:99px;overflow:hidden;position:relative;z-index:1}
.tcard .tc-bar>i{display:block;height:100%;background:#fff;border-radius:99px;opacity:.92;transition:width .3s}
.tcard .tc-foot{display:flex;gap:8px;margin-top:13px;position:relative;z-index:1;flex-wrap:wrap}
.tcard .tc-chip{font-size:12px;font-weight:700;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);padding:4px 11px;border-radius:99px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px}
.card h3{font-size:13px;font-weight:800;color:var(--secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3::before{content:"";width:4px;height:14px;background:var(--primary);border-radius:2px}
.stack{display:flex;height:30px;border-radius:9px;overflow:hidden;background:#f1f5f9}
.stack .seg{display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;cursor:pointer;transition:.15s;min-width:0}
.stack .seg.red{background:var(--red)}.stack .seg.yellow{background:var(--yellow)}.stack .seg.green{background:var(--green)}
.stack .seg:hover{filter:brightness(1.08)}.stack .seg.off{opacity:.32}
.legend{display:flex;gap:16px;margin-top:11px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px;cursor:pointer}.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

    return b.score-a.score;});
  const ord=['①','②','③','④','⑤'];
  const ar=k=>{const i=SORT.findIndex(s=>s.key===k);if(i<0)return '';return ' '+(SORT.length>1?ord[i]:'')+(SORT[i].dir<0?'▼':'▲');};
  const ptable=`<table class="ptable"><thead><tr>
    <th>#</th><th class="l">痛點 / 提出人</th>
    <th class="sortth" onclick="setSort('track')">軌${ar('track')}</th>
    <th class="sortth" onclick="setSort('size')">大小${ar('size')}</th>
    <th class="sortth" onclick="setSort('hr')">每月hr${ar('hr')}</th>
    <th class="sortth" onclick="setSort('imp')">影響${ar('imp')}</th>
    <th class="sortth" onclick="setSort('score')">優先分${ar('score')}</th></tr></thead><tbody>`
    + (sorted.map((x,i)=>`<tr onclick="openPain(${x.pi},${x.xi})">
      <td class="muted">${i+1}</td>
      <td class="l"><b>${esc(x.title)}${x.golden?' ⭐':''}</b><br><span class="muted">${esc(x.person)} · ${esc(x.dept)}</span></td>
      <td><span class="btrack ${TMETA[x.t].c}"><b>${x.t.replace('軌','')}</b></span></td>
      <td><span class="szb ${x.size==='大'?'big':'sml'}">${x.size}</span></td>
      <td class="num">${x.hr?fmt(x.hr):'—'}</td>
      <td>${impLabel((DATA[x.pi].pains[x.xi].fields||{})['影響人數'])}</td>
      <td><div class="scbar"><i style="width:${x.score}%"></i></div><span class="scn">${x.score}</span></td>
    </tr>`).join('')||`<tr><td colspan="7" class="muted" style="padding:24px">無資料</td></tr>`)
    + `</tbody></table>`;
  const chips=[];if(F.track)chips.push('軌別：'+F.track);if(F.dept)chips.push('部門：'+F.dept);if(F.light)chips.push('燈號：'+LNAME[F.light]);if(F.size)chips.push('難度：'+F.size+'任務');
  const fbar=`<div class="filterbar"><b>篩選</b>${chips.length?chips.map(c=>`<span class="fchip">${esc(c)}</span>`).join('')+'<button class="fclear" onclick="clearF()">✕ 清除</button>':'<span class="fhint">點三軌卡 / 燈號 / 矩陣即可連動篩選；點任一痛點看完整分析</span>'}<span class="fcount">顯示 ${cur.length} / ${ALL.length} 痛點</span></div>`;
  document.getElementById('dash').innerHTML=fbar
   +`<div class="grid3">${cards}</div>`
   +`<div class="card"><h3>部門 × 軌別 矩陣</h3><div style="overflow:auto"><table class="matrix">${head}<tbody>${body}</tbody></table></div></div>`
   +`<div class="card"><h3>每月可省工時 Top（${top.length}）· 點列看完整分析</h3>${trows}</div>`
   +`<div class="card"><h3>AI 導入優先排序（${cur.length}）· 點列看完整分析</h3>${szfilter}${sorthint}${ptable}</div>`;
}

/* ===== Tab 3：行動方案（路線圖 + 2×2 矩陣） ===== */
function renderAction(){
  const ALL=PA(), VT=50;
  const sumhr=a=>a.reduce((s,x)=>s+x.hr,0);
  const byT=t=>ALL.filter(x=>x.t===t).sort((a,b)=>b.score-a.score);
  const t2=byT('軌2'), t1=byT('軌1'), t3=byT('軌3');
  const PH=[
    {ic:'🤖',col:'#13b48b',when:'PHASE 1 · NOW',sub:'立即啟動',short:'NOW',nms:'軌2 自訂GPT',nm:'軌2 自訂GPT / ChatGPT',arr:t2,cls:'now',badge:'★ 建議起點',low:true},
    {ic:'☁️',col:'#33597f',when:'PHASE 2 · NEXT',sub:'建置導入',short:'NEXT',nms:'軌1 Bedrock',nm:'軌1 Claude on Bedrock',arr:t1,cls:'next',badge:'',low:false},
    {ic:'🔒',col:'#94a3b8',when:'PHASE 3 · FUTURE',sub:'未來候場',short:'FUTURE',nms:'軌3 地端',nm:'軌3 地端 On-Prem',arr:t3,cls:'future',badge:'',low:true},
  ];
  const strat=`<div class="strat">📌 <b>導入策略（經營層裁示）</b>　先衝 <b style="color:#5eead4">軌2 易用優先</b> ➜ 再上 <b style="color:#93c5fd">軌1 合規建置</b> ➜ <b style="color:#cbd5e1">軌3 未來候場</b></div>`;

  // ── 圖2：連結節點流 ──
  const cx=[150,450,750];
  const svgNodes=PH.map((p,i)=>{const x=cx[i], y=p.low?198:110;
    // 低節點標籤在下、高節點標籤在上；都落在虛線外側、不壓圖
    const l1=p.low?y+82:y-80, l2=p.low?y+100:y-98;
    const dd=p.low?`M${x} ${y+55} L${x} ${y+70}`:`M${x} ${y-55} L${x} ${y-70}`;
    return `<g class="rmnode" onclick="document.getElementById('phase${i}').scrollIntoView({behavior:'smooth',block:'center'})">
      <path d="${dd}" stroke="${p.col}" stroke-width="2.5" stroke-dasharray="2 4" stroke-linecap="round" opacity=".55"/>
      <circle cx="${x}" cy="${y}" r="46" fill="#fff" stroke="${p.col}" stroke-width="7"/>
      <text x="${x}" y="${y+15}" text-anchor="middle" font-size="40">${p.ic}</text>
      <text x="${x}" y="${l1}" text-anchor="middle" font-size="16" font-weight="800" letter-spacing="1" fill="${p.col}">${p.short}</text>
      <text x="${x}" y="${l2}" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">${p.nms} · ${p.arr.length} 痛點</text></g>`;}).join('');
  const svg=`<svg class="rmsvg" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
    <path d="M150 198 C300 198 300 110 450 110 C600 110 600 198 750 198" fill="none" stroke="#e2e8f0" stroke-width="20" stroke-linecap="round"/>
    ${svgNodes}</svg>`;
  const item=(x,col)=>`<div class="pitem" style="border-left:4px solid ${col}" onclick="openPain(${x.pi},${x.xi})"><span class="pi-sc" style="background:${col}">${x.score}</span><div class="pi-t"><b>${esc(x.title)}${x.golden?' ⭐':''}</b><span>${esc(x.person)} · ${esc(x.dept)}${x.hr?' · '+fmt(x.hr)+'hr/月':''}</span></div><div class="pi-prog" title="優先分 ${x.score}"><i style="width:${x.score}%;background:${col}"></i></div></div>`;
  const card=(p,i)=>`<div class="phcard ${p.cls}" id="phase${i}"><div class="ph-top">${p.badge?`<span class="ph-badge">${p.badge}</span>`:''}
    <div class="ph-when">${p.when} · ${p.sub}</div><div class="ph-title">${p.ic} ${p.nm}</div>
    <div class="ph-metric">${p.arr.length} 痛點 · 每月 ${fmt(sumhr(p.arr))} hr</div></div>
    <div class="ph-body">${p.arr.map(x=>item(x,p.col)).join('')||'<div class="muted" style="padding:14px">—</div>'}</div></div>`;
  const roadmap=`<div class="card"><h3>🚀 AI 導入路線圖</h3>${strat}${svg}<div class="rm-detail">${PH.map(card).join('')}</div></div>`;

  // ── 圖1：三軌優先層級漏斗（軌2 ▸ 軌1 ▸ 軌3）──
  const tiers=[
    {n:'01',t:'軌2 · 自訂GPT / ChatGPT',d:'NOW 立即啟動 · 易用即用、零開發',c1:'#079669',c2:'#10c98f',arr:t2},
    {n:'02',t:'軌1 · Claude on Bedrock',d:'NEXT 建置導入 · 合規剛性、需建置',c1:'#1d4ed8',c2:'#3b82f6',arr:t1},
    {n:'03',t:'軌3 · 地端 On-Prem',d:'FUTURE 未來候場 · 待資源與條件成熟',c1:'#475569',c2:'#708095',arr:t3},
  ];
  const ftier=(t,i)=>{const w=100-i*7;
    const bul=t.arr.slice(0,4).map(x=>`<li onclick="openPain(${x.pi},${x.xi})">${esc(x.title.slice(0,15))}</li>`).join('')||'<li class="muted">（無）</li>';
    return `<div class="ftier"><ul class="fbul">${bul}</ul>
      <div class="fbadge" style="border-color:${t.c2}">${t.n}</div>
      <div class="fbarwrap"><div class="fbar" style="width:${w}%;background:linear-gradient(90deg,${t.c1},${t.c2})">
        <span class="fbar-t">${t.t}</span><span class="fbar-d">${t.d}</span><span class="fcount">${t.arr.length} 項 · ${fmt(sumhr(t.arr))} hr</span></div></div></div>`;};
  const funnel=`<div class="card"><h3>🎯 三軌導入優先層級（軌2 ▸ 軌1 ▸ 軌3）· 點左側要點看痛點</h3>
    <div class="funnel">${tiers.map(ftier).join('')}</div>
    <div class="fnaxis">▲ 上層＝越優先導入（軌2 易用即用）　·　下層＝越往後（軌3 未來候場）</div></div>`;

  document.getElementById('actiondash').innerHTML=roadmap+funnel;
}
renderDash();renderAction();
</script>
